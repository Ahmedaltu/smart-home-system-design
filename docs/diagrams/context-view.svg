<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="900" height="600" fill="#0f1117"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">CONTEXT VIEW — Smart Home Energy Optimizer</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-size="11">Team Eternal Architects · Aalto University 2025</text>

  <!-- ===== OUR SYSTEM (center) ===== -->
  <rect x="330" y="230" width="240" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="330" y="230" width="240" height="28" rx="8" fill="#3b82f6"/>
  <rect x="330" y="248" width="240" height="10" fill="#3b82f6"/>
  <text x="450" y="249" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">«system»</text>
  <text x="450" y="278" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Smart Home</text>
  <text x="450" y="296" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Energy Optimizer</text>
  <text x="450" y="318" text-anchor="middle" fill="#64748b" font-size="10">Embedded Hardware + Cloud ML</text>
  <text x="450" y="332" text-anchor="middle" fill="#64748b" font-size="10">FR-01 · FR-02 · FR-03 · FR-04</text>

  <!-- ===== USERS (left) ===== -->
  <!-- stick figure -->
  <circle cx="100" cy="155" r="16" fill="none" stroke="#34d399" stroke-width="2"/>
  <line x1="100" y1="171" x2="100" y2="210" stroke="#34d399" stroke-width="2"/>
  <line x1="100" y1="185" x2="78" y2="200" stroke="#34d399" stroke-width="2"/>
  <line x1="100" y1="185" x2="122" y2="200" stroke="#34d399" stroke-width="2"/>
  <line x1="100" y1="210" x2="82" y2="230" stroke="#34d399" stroke-width="2"/>
  <line x1="100" y1="210" x2="118" y2="230" stroke="#34d399" stroke-width="2"/>
  <text x="100" y="248" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">Users</text>
  <text x="100" y="263" text-anchor="middle" fill="#64748b" font-size="9">Dwellers · Owners</text>
  <text x="100" y="275" text-anchor="middle" fill="#64748b" font-size="9">Housing Companies</text>

  <!-- Users → System: Manage smart devices -->
  <line x1="155" y1="270" x2="328" y2="285" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="328,285 318,279 320,289" fill="#34d399"/>
  <rect x="160" y="257" width="140" height="16" rx="3" fill="#0f1117"/>
  <text x="230" y="269" text-anchor="middle" fill="#34d399" font-size="10">Manage smart devices</text>

  <!-- Users → System: Request consumption data -->
  <line x1="155" y1="290" x2="328" y2="305" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="328,305 318,299 320,309" fill="#34d399"/>
  <rect x="157" y="293" width="148" height="16" rx="3" fill="#0f1117"/>
  <text x="231" y="305" text-anchor="middle" fill="#34d399" font-size="10">Request data &amp; recommendations</text>

  <!-- ===== DATA CONSUMERS (top) ===== -->
  <circle cx="450" cy="95" r="16" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <line x1="450" y1="111" x2="450" y2="150" stroke="#a78bfa" stroke-width="2"/>
  <line x1="450" y1="125" x2="428" y2="140" stroke="#a78bfa" stroke-width="2"/>
  <line x1="450" y1="125" x2="472" y2="140" stroke="#a78bfa" stroke-width="2"/>
  <line x1="450" y1="150" x2="432" y2="170" stroke="#a78bfa" stroke-width="2"/>
  <line x1="450" y1="150" x2="468" y2="170" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="188" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">Data Consumers</text>
  <text x="450" y="202" text-anchor="middle" fill="#64748b" font-size="9">Grid operators · Analytics</text>

  <!-- Data Consumers → System -->
  <line x1="450" y1="207" x2="450" y2="228" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="450,228 444,218 456,218" fill="#a78bfa"/>
  <text x="500" y="220" fill="#a78bfa" font-size="10">Request consumption data (FR-01)</text>

  <!-- ===== SMART DEVICES (right) ===== -->
  <rect x="720" y="210" width="155" height="80" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="797" y="232" text-anchor="middle" fill="#f59e0b" font-size="10">«external»</text>
  <text x="797" y="252" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">Smart Devices</text>
  <text x="797" y="270" text-anchor="middle" fill="#64748b" font-size="9">Zigbee · BT · Wi-Fi · LTE</text>
  <text x="797" y="283" text-anchor="middle" fill="#64748b" font-size="9">NB-IoT · 5G</text>

  <!-- System → Smart Devices: Control -->
  <line x1="570" y1="265" x2="718" y2="258" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="718,258 708,252 710,262" fill="#f59e0b"/>
  <text x="644" y="250" text-anchor="middle" fill="#f59e0b" font-size="10">Control usage (FR-02)</text>

  <!-- Smart Devices → System: Usage data -->
  <line x1="718" y1="272" x2="570" y2="278" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="570,278 580,272 580,282" fill="#f59e0b"/>
  <text x="644" y="292" text-anchor="middle" fill="#f59e0b" font-size="10">Request usage/status data</text>

  <!-- ===== ELECTRICITY SUPPLIER (bottom-right) ===== -->
  <rect x="660" y="420" width="155" height="75" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="737" y="440" text-anchor="middle" fill="#fb923c" font-size="10">«external»</text>
  <text x="737" y="458" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">Electricity Supplier</text>
  <text x="737" y="476" text-anchor="middle" fill="#64748b" font-size="9">Solar · Battery · Grid</text>
  <text x="737" y="489" text-anchor="middle" fill="#64748b" font-size="9">(Prosumer devices)</text>

  <!-- System → Supplier -->
  <line x1="520" y1="348" x2="680" y2="420" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="680,420 672,410 682,410" fill="#fb923c"/>
  <text x="620" y="395" text-anchor="middle" fill="#fb923c" font-size="10">Control electricity production</text>

  <!-- Supplier → System -->
  <line x1="668" y1="435" x2="525" y2="360" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="525,360 528,371 536,363" fill="#fb923c"/>
  <text x="570" y="416" text-anchor="middle" fill="#fb923c" font-size="10">Request production data</text>

  <!-- ===== ELECTRICITY PRICE PROVIDER (bottom-left) ===== -->
  <rect x="80" y="420" width="165" height="75" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="162" y="440" text-anchor="middle" fill="#38bdf8" font-size="10">«external»</text>
  <text x="162" y="458" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">Electricity Price</text>
  <text x="162" y="474" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">Provider</text>
  <text x="162" y="489" text-anchor="middle" fill="#64748b" font-size="9">Spot &amp; futures prices (daily)</text>

  <!-- System → Price Provider -->
  <line x1="370" y1="348" x2="228" y2="420" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="228,420 220,410 230,410" fill="#38bdf8"/>
  <text x="280" y="395" text-anchor="middle" fill="#38bdf8" font-size="10">Request electricity spot price</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="510" width="840" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="530" fill="#94a3b8" font-size="11" font-weight="700">LEGEND</text>
  <line x1="120" y1="526" x2="175" y2="526" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="175,526 165,521 167,531" fill="#94a3b8"/>
  <text x="185" y="530" fill="#94a3b8" font-size="10">Interaction (A initiates → B)</text>
  <rect x="360" y="518" width="60" height="20" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="532" text-anchor="middle" fill="#93c5fd" font-size="9">System</text>
  <text x="440" y="530" fill="#94a3b8" font-size="10">Proposed system boundary</text>
  <rect x="600" y="518" width="60" height="20" rx="3" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="630" y="532" text-anchor="middle" fill="#94a3b8" font-size="9">«external»</text>
  <text x="670" y="530" fill="#94a3b8" font-size="10">External system or stakeholder</text>

  <text x="50" y="562" fill="#64748b" font-size="10">Addresses: FR-01 (data on demand) · FR-02 (device control) · FR-03 (recommendations) · FR-04 (anomaly detection)</text>
</svg>
