<svg viewBox="0 0 1300 800" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr_g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#34d399"/>
    </marker>
    <marker id="arr_b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr_y" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr_v" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arr_o" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1300" height="800" fill="url(#bg)"/>
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff05" stroke-width="1"/>
  </pattern>
  <rect width="1300" height="800" fill="url(#grid)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1300" height="72" fill="url(#hdr)" opacity="0.9"/>
  <rect x="0" y="70" width="1300" height="2" fill="#3b82f6" opacity="0.6"/>
  <text x="650" y="30" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">INFORMATION VIEW</text>
  <text x="650" y="55" text-anchor="middle" fill="#93c5fd" font-size="13" letter-spacing="1">Smart Home Energy Optimizer · Team Eternal Architects · Aalto University 2025</text>
  <text x="650" y="68" text-anchor="middle" fill="#3b82f6" font-size="10">Relevant ASRs: NFR-03 (interoperability) · NFR-05 (data anonymization / GDPR) · FR-01 (data collection) · FR-02 (device control)</text>

  <!-- ═══════════════════════════════════════════
       PROCESS NODES (ellipses)
  ═══════════════════════════════════════════ -->

  <!-- Settings Management -->
  <ellipse cx="480" cy="200" rx="115" ry="52" fill="#0d2a1e" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="194" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">Settings</text>
  <text x="480" y="212" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">Management</text>
  <text x="480" y="230" text-anchor="middle" fill="#64748b" font-size="9">UserInteractionService</text>

  <!-- Usage Collection -->
  <ellipse cx="480" cy="430" rx="115" ry="52" fill="#0a1628" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="424" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Usage</text>
  <text x="480" y="442" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Collection</text>
  <text x="480" y="460" text-anchor="middle" fill="#64748b" font-size="9">ElecDataCollectionService</text>

  <!-- Data Analysis -->
  <ellipse cx="750" cy="430" rx="115" ry="52" fill="#1a0d2e" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="424" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">Data</text>
  <text x="750" y="442" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">Analysis</text>
  <text x="750" y="460" text-anchor="middle" fill="#64748b" font-size="9">DataAnalysisService · ML</text>

  <!-- Price Collection -->
  <ellipse cx="480" cy="630" rx="115" ry="52" fill="#1c0a00" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="624" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">Price</text>
  <text x="480" y="642" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">Collection</text>
  <text x="480" y="660" text-anchor="middle" fill="#64748b" font-size="9">PriceCollectionService</text>

  <!-- ═══════════════════════════════════════════
       EXTERNAL / STAKEHOLDER NODES
  ═══════════════════════════════════════════ -->

  <!-- Smart Devices -->
  <rect x="60" y="290" width="175" height="85" rx="8" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="290" width="175" height="28" rx="8" fill="#451a03" opacity="0.9"/>
  <rect x="60" y="306" width="175" height="12" fill="#451a03" opacity="0.9"/>
  <text x="147" y="308" text-anchor="middle" fill="#fde68a" font-size="9">«external»</text>
  <text x="147" y="330" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Smart Device(s)</text>
  <text x="147" y="350" text-anchor="middle" fill="#64748b" font-size="10">Zigbee · BT · Wi-Fi · LTE</text>
  <text x="147" y="367" text-anchor="middle" fill="#64748b" font-size="10">NB-IoT · 5G (NFR-03)</text>

  <!-- Price Data Providers -->
  <rect x="60" y="590" width="175" height="85" rx="8" fill="#1c0a00" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="590" width="175" height="28" rx="8" fill="#431407" opacity="0.9"/>
  <rect x="60" y="606" width="175" height="12" fill="#431407" opacity="0.9"/>
  <text x="147" y="608" text-anchor="middle" fill="#fed7aa" font-size="9">«external»</text>
  <text x="147" y="629" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">Price Data</text>
  <text x="147" y="647" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">Providers</text>
  <text x="147" y="667" text-anchor="middle" fill="#64748b" font-size="10">External APIs · Daily updates</text>

  <!-- User (right) -->
  <rect x="1060" y="175" width="175" height="130" rx="8" fill="#0d2a1e" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1060" y="175" width="175" height="28" rx="8" fill="#064e3b" opacity="0.9"/>
  <rect x="1060" y="191" width="175" height="12" fill="#064e3b" opacity="0.9"/>
  <text x="1147" y="193" text-anchor="middle" fill="#6ee7b7" font-size="9">«stakeholder»</text>
  <circle cx="1147" cy="228" r="15" fill="none" stroke="#34d399" stroke-width="2"/>
  <line x1="1147" y1="243" x2="1147" y2="272" stroke="#34d399" stroke-width="2"/>
  <line x1="1147" y1="255" x2="1130" y2="265" stroke="#34d399" stroke-width="2"/>
  <line x1="1147" y1="255" x2="1164" y2="265" stroke="#34d399" stroke-width="2"/>
  <line x1="1147" y1="272" x2="1133" y2="290" stroke="#34d399" stroke-width="2"/>
  <line x1="1147" y1="272" x2="1161" y2="290" stroke="#34d399" stroke-width="2"/>
  <text x="1147" y="305" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">User</text>

  <!-- Data Consumer (right) -->
  <rect x="1060" y="390" width="175" height="130" rx="8" fill="#1a0d2e" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1060" y="390" width="175" height="28" rx="8" fill="#2e1065" opacity="0.9"/>
  <rect x="1060" y="406" width="175" height="12" fill="#2e1065" opacity="0.9"/>
  <text x="1147" y="408" text-anchor="middle" fill="#c4b5fd" font-size="9">«stakeholder»</text>
  <circle cx="1147" cy="443" r="15" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <line x1="1147" y1="458" x2="1147" y2="487" stroke="#a78bfa" stroke-width="2"/>
  <line x1="1147" y1="470" x2="1130" y2="480" stroke="#a78bfa" stroke-width="2"/>
  <line x1="1147" y1="470" x2="1164" y2="480" stroke="#a78bfa" stroke-width="2"/>
  <line x1="1147" y1="487" x2="1133" y2="505" stroke="#a78bfa" stroke-width="2"/>
  <line x1="1147" y1="487" x2="1161" y2="505" stroke="#a78bfa" stroke-width="2"/>
  <text x="1147" y="520" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700">Data Consumer</text>
  <text x="1147" y="535" text-anchor="middle" fill="#64748b" font-size="10">Grid operators · Analytics</text>

  <!-- ═══════════════════════════════════════════
       DATA FLOW ARROWS + LABELS
  ═══════════════════════════════════════════ -->

  <!-- Smart Devices → Settings Management: current settings, timestamp -->
  <path d="M235,310 Q340,270 365,210" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr_g)"/>
  <rect x="236" y="248" width="130" height="32" rx="4" fill="#0d2a1e" stroke="#064e3b" stroke-width="0.5"/>
  <text x="301" y="262" text-anchor="middle" fill="#6ee7b7" font-size="10">Current device settings</text>
  <text x="301" y="276" text-anchor="middle" fill="#6ee7b7" font-size="10">Settings timestamp</text>

  <!-- Smart Devices → Usage Collection: amount used, time of use -->
  <path d="M235,355 Q340,400 365,418" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arr_b)"/>
  <rect x="230" y="370" width="110" height="32" rx="4" fill="#0a1628" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="285" y="384" text-anchor="middle" fill="#93c5fd" font-size="10">Amount used</text>
  <text x="285" y="398" text-anchor="middle" fill="#93c5fd" font-size="10">Time of use</text>

  <!-- Settings Management → Smart Devices: change device settings -->
  <path d="M365,188 Q240,175 180,300" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr_g)"/>
  <rect x="200" y="198" width="138" height="20" rx="4" fill="#0d2a1e" stroke="#064e3b" stroke-width="0.5"/>
  <text x="269" y="212" text-anchor="middle" fill="#6ee7b7" font-size="10">Change device settings</text>

  <!-- Settings Management → User: app-specific settings change -->
  <path d="M595,188 Q820,160 1058,220" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr_g)"/>
  <rect x="740" y="158" width="175" height="20" rx="4" fill="#0d2a1e" stroke="#064e3b" stroke-width="0.5"/>
  <text x="827" y="172" text-anchor="middle" fill="#6ee7b7" font-size="10">Change to app-specific settings</text>

  <!-- Settings Management → Data Analysis: settings data -->
  <path d="M575,215 Q660,215 635,395" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr_g)"/>
  <rect x="638" y="288" width="90" height="20" rx="4" fill="#0d2a1e" stroke="#064e3b" stroke-width="0.5"/>
  <text x="683" y="302" text-anchor="middle" fill="#6ee7b7" font-size="10">Settings data</text>

  <!-- Usage Collection → Data Analysis: usage data -->
  <line x1="595" y1="430" x2="635" y2="430" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr_b)"/>
  <rect x="598" y="414" width="30" height="18" rx="3" fill="#0a1628"/>
  <text x="613" y="427" text-anchor="middle" fill="#93c5fd" font-size="9">Usage</text>

  <!-- Price Collection → Data Analysis: price data -->
  <path d="M595,617 Q680,617 680,482" stroke="#fb923c" stroke-width="2" fill="none" marker-end="url(#arr_o)"/>
  <rect x="688" y="535" width="75" height="20" rx="4" fill="#1c0a00" stroke="#431407" stroke-width="0.5"/>
  <text x="725" y="549" text-anchor="middle" fill="#fed7aa" font-size="10">Price data</text>

  <!-- Price Provider → Price Collection: spot prices, futures -->
  <line x1="235" y1="632" x2="365" y2="632" stroke="#fb923c" stroke-width="2" marker-end="url(#arr_o)"/>
  <rect x="238" y="604" width="105" height="30" rx="4" fill="#1c0a00" stroke="#431407" stroke-width="0.5"/>
  <text x="290" y="618" text-anchor="middle" fill="#fed7aa" font-size="10">Spot prices</text>
  <text x="290" y="632" text-anchor="middle" fill="#fed7aa" font-size="10">Futures contract prices</text>

  <!-- Data Analysis → User: Recommendations + user-specific usage -->
  <path d="M865,405 Q960,350 1058,255" stroke="#a78bfa" stroke-width="2.5" fill="none" marker-end="url(#arr_v)"/>
  <rect x="900" y="316" width="130" height="20" rx="4" fill="#1a0d2e" stroke="#2e1065" stroke-width="0.5"/>
  <text x="965" y="330" text-anchor="middle" fill="#c4b5fd" font-size="10">Recommendation (FR-03)</text>

  <path d="M865,440 Q960,440 1058,430" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arr_b)"/>
  <rect x="875" y="418" width="155" height="20" rx="4" fill="#0a1628" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="952" y="432" text-anchor="middle" fill="#93c5fd" font-size="10">User-specific usage data</text>

  <!-- Data Analysis → Data Consumer: ANONYMIZED aggregated -->
  <path d="M865,460 Q960,510 1058,465" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-dasharray="8,4" marker-end="url(#arr_v)"/>
  <rect x="875" y="488" width="165" height="32" rx="4" fill="#1a0d2e" stroke="#2e1065" stroke-width="0.5"/>
  <text x="957" y="502" text-anchor="middle" fill="#c4b5fd" font-size="10">Anonymized &amp; aggregated</text>
  <text x="957" y="516" text-anchor="middle" fill="#c4b5fd" font-size="10">usage data (GDPR · NFR-05)</text>

  <!-- ═══════════════════════════════════════════
       DATA CATALOGUE (bottom)
  ═══════════════════════════════════════════ -->
  <rect x="25" y="700" width="1250" height="85" rx="10" fill="#0a0f1a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="50" y="722" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="1">DATA CATALOGUE</text>

  <!-- Settings -->
  <rect x="50" y="730" width="18" height="12" rx="2" fill="#34d399"/>
  <text x="75" y="741" fill="#6ee7b7" font-size="10" font-weight="600">Settings Data</text>
  <text x="75" y="754" fill="#64748b" font-size="9">Device state, type, config. Source of truth = device (ADR-16)</text>

  <!-- Usage -->
  <rect x="300" y="730" width="18" height="12" rx="2" fill="#3b82f6"/>
  <text x="325" y="741" fill="#93c5fd" font-size="10" font-weight="600">Usage Data</text>
  <text x="325" y="754" fill="#64748b" font-size="9">Timestamped consumption. Stored in TimescaleDB. Retained 6 months.</text>

  <!-- Price -->
  <rect x="590" y="730" width="18" height="12" rx="2" fill="#fb923c"/>
  <text x="615" y="741" fill="#fed7aa" font-size="10" font-weight="600">Price Data</text>
  <text x="615" y="754" fill="#64748b" font-size="9">Spot &amp; futures from external APIs. Stored in PostgreSQL. Daily update.</text>

  <!-- Recommendations -->
  <rect x="870" y="730" width="18" height="12" rx="2" fill="#a78bfa"/>
  <text x="895" y="741" fill="#c4b5fd" font-size="10" font-weight="600">Recommendations</text>
  <text x="895" y="754" fill="#64748b" font-size="9">ML output. Cost-saving suggestions for coming week (FR-03, NFR-07).</text>

  <!-- Anonymized note -->
  <rect x="50" y="762" width="1200" height="16" rx="3" fill="#0a0f1a" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="50" y="774" fill="#3b82f6" font-size="9" font-weight="600">⚑  GDPR (NFR-05):</text>
  <text x="175" y="774" fill="#64748b" font-size="9">Data consumers receive ONLY anonymized, aggregated data — no PII is stored anywhere in the system. Anonymization happens inside DataAnalysisService (ADR-25).</text>

  <!-- Legend row -->
  <rect x="25" y="790" width="1250" height="6" rx="3" fill="#0a0f1a"/>
  <text x="50" y="784" fill="#64748b" font-size="9">Flow types:</text>
  <line x1="130" y1="780" x2="170" y2="780" stroke="#34d399" stroke-width="2" marker-end="url(#arr_g)"/>
  <text x="175" y="784" fill="#6ee7b7" font-size="9">Settings</text>
  <line x1="250" y1="780" x2="290" y2="780" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr_b)"/>
  <text x="295" y="784" fill="#93c5fd" font-size="9">Usage</text>
  <line x1="360" y1="780" x2="400" y2="780" stroke="#fb923c" stroke-width="2" marker-end="url(#arr_o)"/>
  <text x="405" y="784" fill="#fed7aa" font-size="9">Price</text>
  <line x1="470" y1="780" x2="510" y2="780" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arr_v)"/>
  <text x="515" y="784" fill="#c4b5fd" font-size="9">Recommendations / Aggregated</text>
  <line x1="710" y1="776" x2="750" y2="776" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arr_v)"/>
  <text x="755" y="780" fill="#64748b" font-size="9">Anonymized output to data consumers</text>
</svg>
