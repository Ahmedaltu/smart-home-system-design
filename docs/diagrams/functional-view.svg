<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <rect width="1100" height="820" fill="#0f1117"/>
  
  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">FUNCTIONAL VIEW — Smart Home Energy Optimizer</text>
  <text x="550" y="54" text-anchor="middle" fill="#64748b" font-size="11">Team Eternal Architects · Aalto University 2025</text>

  <!-- System boundary -->
  <rect x="30" y="70" width="1040" height="680" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="50" y="93" fill="#1e3a5f" font-size="12" font-weight="700">«internal system boundary»</text>

  <!-- ============ ROW 1: User Interfaces ============ -->
  <!-- User UI -->
  <rect x="60" y="105" width="145" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="132" y="125" text-anchor="middle" fill="#34d399" font-size="9">«browser»</text>
  <text x="132" y="143" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">User UI</text>
  <text x="132" y="159" text-anchor="middle" fill="#64748b" font-size="9">React</text>
  <text x="132" y="170" text-anchor="middle" fill="#64748b" font-size="9">Web Interface</text>

  <!-- Mobile User UI -->
  <rect x="235" y="105" width="145" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="307" y="125" text-anchor="middle" fill="#34d399" font-size="9">«application»</text>
  <text x="307" y="143" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Mobile User UI</text>
  <text x="307" y="159" text-anchor="middle" fill="#64748b" font-size="9">React Native</text>
  <text x="307" y="170" text-anchor="middle" fill="#64748b" font-size="9">Push Notifications</text>

  <!-- Data Platform -->
  <rect x="410" y="105" width="145" height="70" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
