  <line x1="307" y1="175" x2="307" y2="235" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="175" x2="360" y2="235" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UserInteraction ↔ UserDataDB -->
  <line x1="235" y1="265" x2="205" y2="265" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UserInteraction → DeviceControl -->
  <line x1="400" y1="265" x2="500" y2="265" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- UserInteraction ↔ DataAnalysis -->
  <line x1="285" y1="305" x2="285" y2="435" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="305" y1="435" x2="305" y2="305" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- DeviceControl → DeviceStateDB -->
  <line x1="577" y1="305" x2="577" y2="340" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DeviceControl → DataTransform (via bottom) -->
  <path d="M655,270 Q760,270 820,590" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- DataAnalysis → PriceCollection -->
  <line x1="275" y1="505" x2="275" y2="560" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DataAnalysis → ElecDataCollection -->
  <path d="M400,490 Q600,490 650,560" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- PriceCollection → PriceDataDB -->
  <line x1="235" y1="592" x2="205" y2="592" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PriceCollection → ElecPriceSystem -->
  <line x1="280" y1="625" x2="240" y2="700" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ElecDataCollection → ElecUsageDB -->
  <line x1="620" y1="592" x2="585" y2="592" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ElecDataCollection → DataTransform -->
  <line x1="785" y1="592" x2="820" y2="592" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DataTransform → SmartDevices -->
  <line x1="897" y1="625" x2="885" y2="700" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DataTransform → ElecSupplier -->
  <line x1="860" y1="614" x2="745" y2="700" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AAA → UserInteraction (dashed) -->
  <line x1="860" y1="150" x2="400" y2="265" stroke="#f87171" stroke-width="1.5" stroke-dasharray="8,4" marker-end="url(#arr_r)"/>
  <text x="640" y="195" text-anchor="middle" fill="#f87171" font-size="9">Auth guards all services</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr_r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- ============ LEGEND ============ -->
  <rect x="30" y="760" width="1040" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="780" fill="#94a3b8" font-size="11" font-weight="700">LEGEND</text>
  <rect x="120" y="768" width="50" height="18" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="781" text-anchor="middle" fill="#93c5fd" font-size="8">«service»</text>
  <text x="178" y="780" fill="#94a3b8" font-size="9">Core service</text>
  <rect x="260" y="768" width="50" height="18" rx="3" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="285" y="781" text-anchor="middle" fill="#7dd3fc" font-size="8">«database»</text>
  <text x="318" y="780" fill="#94a3b8" font-size="9">Database</text>
  <rect x="400" y="768" width="50" height="18" rx="3" fill="#0f1117" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="425" y="781" text-anchor="middle" fill="#fdba74" font-size="8">«external»</text>
  <text x="458" y="780" fill="#94a3b8" font-size="9">External system</text>
  <line x1="580" y1="778" x2="630" y2="778" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="640" y="780" fill="#94a3b8" font-size="9">A uses interface provided by B</text>
  <line x1="810" y1="774" x2="860" y2="774" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr_r)"/>
  <text x="870" y="778" fill="#94a3b8" font-size="9">Bidirectional / async alert</text>
</svg>
