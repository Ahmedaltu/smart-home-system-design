  <!-- Data Analysis Service -->
  <rect x="235" y="435" width="165" height="70" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="317" y="455" text-anchor="middle" fill="#a78bfa" font-size="9">«service»</text>
  <text x="317" y="472" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Data Analysis</text>
  <text x="317" y="487" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Service</text>
  <text x="317" y="500" text-anchor="middle" fill="#64748b" font-size="9">Python · scikit-learn · PyTorch</text>

