  <rect x="60" y="560" width="145" height="65" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="132" y="578" text-anchor="middle" fill="#38bdf8" font-size="9">«database»</text>
