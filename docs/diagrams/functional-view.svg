  <text x="577" y="255" text-anchor="middle" fill="#f59e0b" font-size="9">«service»</text>
  <text x="577" y="272" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Device Control</text>
  <text x="577" y="287" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Service</text>
  <text x="577" y="300" text-anchor="middle" fill="#64748b" font-size="9">Node.js</text>

  <!-- Device State DB -->
  <rect x="500" y="340" width="155" height="65" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="577" y="360" text-anchor="middle" fill="#38bdf8" font-size="9">«database»</text>
  <text x="577" y="376" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">Device State DB</text>
  <text x="577" y="394" text-anchor="middle" fill="#64748b" font-size="9">MongoDB</text>

