  <rect x="860" y="105" width="175" height="70" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="947" y="122" text-anchor="middle" fill="#f87171" font-size="9">«service»</text>
  <text x="947" y="137" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Authentication</text>
